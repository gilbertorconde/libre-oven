                     id(grill_element_relay).state || id(fan_relay).state;
      bool light_ssr = id(light_relay).state || any_ssr;
      bool any_draft = id(desired_top_element) || id(desired_bottom_element) ||
                       id(desired_grill_element) || id(desired_fan_element);
      bool any_active = id(active_top_element) || id(active_bottom_element) ||
                        id(active_grill_element) || id(active_fan_element);
      if (light_ssr)              return 2;  // yellow
      if (any_draft || any_active) return 1; // white
      return 0;                              // gray

  # Temperature Encoder (GPIO41, GPIO42)
  - platform: rotary_encoder
    id: encoder_temperature
    name: "Temperature Encoder"
    internal: true
    pin_a:
      number: GPIO42
      mode: INPUT_PULLUP
    pin_b:
      number: GPIO41
      mode: INPUT_PULLUP
    resolution: 2
    # Use a large range so clamping never stops delta detection;
    # we still clamp working_temperature itself to 0–280°C.
    min_value: -32768
    max_value: 32767
    publish_initial_value: true
    on_value:
      then:
        - lambda: |-
            // Ignore encoder input during startup splash
            if (millis() < 12000) return;

            bool was_sleeping = id(screen_sleeping);
            id(wake_screen).execute();

            static float last_val = x;
            float delta = x - last_val;
            last_val = x;
            if (delta == 0) return;

            // If screen was sleeping, just wake it - don't navigate or adjust
            if (was_sleeping) return;

            int direction = (delta > 0) ? 1 : -1;

            // From main screen: rotate navigates to temperature page
            if (id(current_page) == 0) {
              id(current_page) = 2;
              return;
            }

            if (id(current_page) == 2) {
              // On temperature page: fine adjust 1 by 1 (°C)
              id(working_temperature) += direction * 1;
              if (id(working_temperature) < 0) id(working_temperature) = 0;
              if (id(working_temperature) > 280) id(working_temperature) = 280;
            } else if (id(current_page) == 1) {
              // On timer page: adjust duration/start in 30 min steps
              float step = 30.0f;
              if (id(timer_edit_phase) == 0) {
                id(working_timer) += direction * step;
                if (id(working_timer) < 0) id(working_timer) = 0;
              } else {
                id(working_start_delay) += direction * step;
                if (id(working_start_delay) < 0) id(working_start_delay) = 0;
              }
            }

  # Timer Encoder (GPIO9, GPIO10)
  - platform: rotary_encoder
    id: encoder_timer
    name: "Timer Encoder"
    internal: true
    pin_a:
      number: GPIO10
      mode: INPUT_PULLUP
    pin_b:
      number: GPIO9
      mode: INPUT_PULLUP
    resolution: 4
    # Use a large range so clamping never stops delta detection
    min_value: -32768
    max_value: 32767
    publish_initial_value: true
    on_value:
      then:
        - lambda: |-
            // Ignore encoder input during startup splash
            if (millis() < 12000) return;

            bool was_sleeping = id(screen_sleeping);
            id(wake_screen).execute();

            static float last_val = x;
            float delta = x - last_val;
            last_val = x;
            if (delta == 0) return;

            // If screen was sleeping, just wake it - don't navigate or adjust
            if (was_sleeping) return;

            int direction = (delta > 0) ? 1 : -1;

            // From main screen: rotate navigates to timer page
            if (id(current_page) == 0) {
              id(current_page) = 1;
              id(timer_edit_phase) = 0;
              return;
            }

            if (id(current_page) == 2) {
              // On temperature page: change temperature 10 by 10
              id(working_temperature) += direction * 10;
              if (id(working_temperature) < 0) id(working_temperature) = 0;
              if (id(working_temperature) > 280) id(working_temperature) = 280;
            } else if (id(current_page) == 1) {
              // On timer page: adjust duration/start in 1 min steps
              float step = 1.0f;
              if (id(timer_edit_phase) == 0) {
                id(working_timer) += direction * step;
                if (id(working_timer) < 0) id(working_timer) = 0;
              } else {
                // Lock delay editing when program is running
                if (id(timer_state) == 0) {
                  id(working_start_delay) += direction * step;
                  if (id(working_start_delay) < 0) id(working_start_delay) = 0;
                }
              }
            }

  # Mode Encoder (GPIO38, GPIO39)
  # Use a large range so the value never clamps: clamping at 0/10 caused
  # "one direction not registering" (delta stayed 0 at the boundary).
  - platform: rotary_encoder
    id: encoder_mode
    name: "Mode Encoder"
    internal: true
    pin_a:
      number: GPIO39
      mode: INPUT_PULLUP
    pin_b:
      number: GPIO38
      mode: INPUT_PULLUP
    resolution: 2
    min_value: -32768
    max_value: 32767
    publish_initial_value: true
    on_value:
      then:
        - lambda: |-
            // Ignore encoder input during startup splash
            if (millis() < 12000) return;

            bool was_sleeping = id(screen_sleeping);
            id(wake_screen).execute();

            static float last_val = x;
            float delta = x - last_val;
            last_val = x;
            if (delta == 0) return;

            // If screen was sleeping, just wake it - don't navigate or adjust
            if (was_sleeping) return;

            int direction = (delta > 0) ? 1 : -1;

            // From main screen: rotate navigates to mode page
            if (id(current_page) == 0) {
              id(current_page) = 3;
              return;
            }

            if (id(current_page) == 2) {
              // On temperature page: adjust 5 by 5
              id(working_temperature) += direction * 5;
              if (id(working_temperature) < 0) id(working_temperature) = 0;
              if (id(working_temperature) > 280) id(working_temperature) = 280;
            } else if (id(current_page) == 1) {
              // On timer page: adjust duration/start in 10 min steps
              float step = 10.0f;
              if (id(timer_edit_phase) == 0) {
                id(working_timer) += direction * step;
                if (id(working_timer) < 0) id(working_timer) = 0;
              } else {
                if (id(timer_state) == 0) {
                  id(working_start_delay) += direction * step;
                  if (id(working_start_delay) < 0) id(working_start_delay) = 0;
                }
              }
            } else if (id(current_page) == 3) {
              // On mode page: navigate through elements
              id(mode_selected_element) += direction;
              if (id(mode_selected_element) < 0) id(mode_selected_element) = 4;
              if (id(mode_selected_element) > 4) id(mode_selected_element) = 0;
            }

