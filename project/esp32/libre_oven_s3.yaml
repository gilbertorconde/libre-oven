    lambda: |-
      int state = id(timer_state);
      if (state == 1 || state == 2) return id(timer_delay_remaining);
      if (state == 3 || state == 4) return id(timer_cook_remaining);
      return 0;

  # ── Element visual-state sensors for HA frontend SVG ──
  # 0 = gray (off), 1 = white (draft/selected), 2 = yellow (armed/active-aux), 3 = red (SSR on/heating)
  - platform: template
    id: ha_top_element_state
    name: "Top Element State"
    icon: "mdi:radiator"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      bool ssr = id(top_element_relay).state;
      bool active = id(active_top_element);
      bool draft = id(desired_top_element);
      bool any_heating = id(active_top_element) || id(active_bottom_element) || id(active_grill_element);
      float target = id(active_temperature);
      bool allow_heat = (target > 0.0f && any_heating) &&
        (id(timer_state) == 2 || id(timer_state) == 3 || id(timer_state) == 4);
      if (ssr)                    return 3;  // red
      if (allow_heat && active)   return 2;  // yellow
      if (draft || active)        return 1;  // white
      return 0;                              // gray

  - platform: template
    id: ha_bottom_element_state
    name: "Bottom Element State"
    icon: "mdi:radiator"
    accuracy_decimals: 0
    update_interval: 1s
    lambda: |-
      bool ssr = id(bottom_element_relay).state;
      bool active = id(active_bottom_element);
      bool draft = id(desired_bottom_element);
      bool any_heating = id(active_top_element) || id(active_bottom_element) || id(active_grill_element);
      float target = id(active_temperature);
      bool allow_heat = (target > 0.0f && any_heating) &&
        (id(timer_state) == 2 || id(timer_state) == 3 || id(timer_state) == 4);
      if (ssr)                    return 3;  // red
      if (allow_heat && active)   return 2;  // yellow
