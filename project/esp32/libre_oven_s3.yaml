    lambda: |-
      int state = id(timer_state);
      if (state == 1) return std::string("WAITING");
      if (state == 2) return std::string("PREHEATING");
      if (state == 3) return std::string("READY");
      if (state == 4) return std::string("COOKING");
      return std::string("IDLE");

  - platform: template
