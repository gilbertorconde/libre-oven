    lambda: |-
      bool ssr = id(grill_element_relay).state;
      bool active = id(active_grill_element);
      bool draft = id(desired_grill_element);
      bool any_heating = id(active_top_element) || id(active_bottom_element) || id(active_grill_element);
      float target = id(active_temperature);
      bool allow_heat = (target > 0.0f && any_heating) &&
        (id(timer_state) == 2 || id(timer_state) == 3 || id(timer_state) == 4);
      if (ssr)                    return 3;  // red
      if (allow_heat && active)   return 2;  // yellow
      if (draft || active)        return 1;  // white
      return 0;                              // gray

  - platform: template
    id: ha_fan_element_state
