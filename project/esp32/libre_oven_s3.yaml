# Binary sensors
binary_sensor:
  # API connection status
  - platform: status
    id: api_connected
    name: "API Connection"

  # Temperature Encoder Button (GPIO47)
  - platform: gpio
    id: button_temperature
    name: "Temperature Button"
    internal: true
    pin:
      number: GPIO47
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      then:
        - lambda: |-
            bool was_sleeping = id(screen_sleeping);
            id(wake_screen).execute();
            if (!was_sleeping) {
              int page = id(current_page);
              if (page == 0 && id(timer_state) == 3) {
                id(timer_state) = 4;
              } else if (page == 0) {
                // Main screen: temp button does nothing (just wake)
              } else if (page == 4 || page == 5) {
                // On confirmation screens: any non-confirm button cancels back to main
                id(current_page) = 0;
              } else {
                id(current_page) = 0;
              }
            }

  # Timer Encoder Button (GPIO8)
  - platform: gpio
    id: button_timer
    name: "Timer Button"
    internal: true
    pin:
      number: GPIO8
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      then:
        - lambda: |-
            bool was_sleeping = id(screen_sleeping);
            id(wake_screen).execute();
            if (!was_sleeping) {
              int page = id(current_page);
              if (page == 0 && id(timer_state) == 3) {
                id(timer_state) = 4;
              } else if (page == 0) {
                // Main screen: timer press → go to Apply Confirmation screen
                id(current_page) = 4;
              } else if (page == 4) {
                id(apply_program).execute();
                id(current_page) = 0;
              } else if (page == 5) {
                id(current_page) = 0;
              } else if (page == 1) {
                // On timer sub-screen: phase toggle / return to main (no applying)
                if (id(timer_edit_phase) == 0) {
                  // If program is running, skip delay editing (locked)
                  if (id(timer_state) >= 1) {
                    // Delay locked while running, just return to main
                    id(timer_edit_phase) = 0;
                    id(current_page) = 0;
                  } else {
                    id(timer_edit_phase) = 1;
                  }
                } else {
                  id(timer_edit_phase) = 0;
                  id(current_page) = 0;
                }
              } else {
                id(current_page) = 0;
              }
            }

  # Mode Encoder Button (GPIO40)
  - platform: gpio
    id: button_mode
    name: "Mode Button"
    internal: true
    pin:
      number: GPIO40
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      then:
        - lambda: |-
            bool was_sleeping = id(screen_sleeping);
            id(wake_screen).execute();
            if (!was_sleeping) {
              int page = id(current_page);
              if (page == 0 && id(timer_state) == 3) {
                id(timer_state) = 4;
              } else if (page == 0) {
                // Main screen: mode press → go to Cancel Confirmation screen
                id(current_page) = 5;
              } else if (page == 5) {
                id(cancel_program).execute();
                id(current_page) = 0;
              } else if (page == 4) {
                id(current_page) = 0;
              } else if (page == 3) {
                // On mode sub-screen: toggle selected element or go back
                int selected = id(mode_selected_element);
                if (selected == 4) {
                  id(current_page) = 0;
                } else {
                  bool new_state;
                  if (selected == 0) {
                    new_state = !id(desired_top_element);
                    id(desired_top_element) = new_state;
                  } else if (selected == 1) {
                    new_state = !id(desired_bottom_element);
                    id(desired_bottom_element) = new_state;
                  } else if (selected == 2) {
                    new_state = !id(desired_grill_element);
                    id(desired_grill_element) = new_state;
                  } else if (selected == 3) {
                    new_state = !id(desired_fan_element);
                    id(desired_fan_element) = new_state;
                  }
                }
              } else {
                id(current_page) = 0;
              }
            }

  # System ON/OFF state
  - platform: template
    id: system_on
    name: "System ON"
    lambda: |-
      bool any_ssr_on =
        id(top_element_relay).state ||
        id(bottom_element_relay).state ||
        id(grill_element_relay).state ||
        id(fan_relay).state;
      return any_ssr_on || id(timer_state) != 0;

# Scripts
script:
  # Apply all draft values to the active runtime (start or update a program)
  - id: apply_program
    then:
      - lambda: |-
          // Copy draft values to active
          id(active_temperature) = id(working_temperature);
          id(active_top_element) = id(desired_top_element);
          id(active_bottom_element) = id(desired_bottom_element);
          id(active_grill_element) = id(desired_grill_element);
          id(active_fan_element) = id(desired_fan_element);

          if (id(timer_state) == 0) {
            // IDLE: start a fresh program
            id(preheat_elapsed_seconds) = 0;
            id(timer_cook_remaining) = (int)(id(working_timer) * 60.0f);
            id(cook_total_seconds) = id(timer_cook_remaining);
            id(timer_delay_remaining) = (int)(id(working_start_delay) * 60.0f);
            bool needs_preheat = id(active_temperature) > 0.0f &&
              (id(active_top_element) || id(active_bottom_element) || id(active_grill_element));
            if (!needs_preheat) {
              // Fan-only or no heating: skip straight to cooking
              id(timer_state) = id(timer_delay_remaining) > 0 ? 1 : 4;
            } else {
              id(timer_state) = id(timer_delay_remaining) > 0 ? 1 : 2;
            }
          } else {
            // RUNNING: update the active program
            // Duration: calculate delta from last applied total and add to remaining
            int new_total = (int)(id(working_timer) * 60.0f);
            int delta = new_total - id(cook_total_seconds);
            int new_remaining = id(timer_cook_remaining) + delta;
            id(timer_cook_remaining) = new_remaining > 0 ? new_remaining : 0;
            id(cook_total_seconds) = new_total;
            // Delay: can't change while running (ignored)
          }

  # Cancel the running program and reset everything
  - id: cancel_program
    then:
      - lambda: |-
          auto call = id(pid_climate).make_call();
          call.set_mode("OFF");
          call.perform();
          id(pid_heat_was_active) = false;
          id(top_element_relay).turn_off();
          id(bottom_element_relay).turn_off();
          id(grill_element_relay).turn_off();
          id(fan_relay).turn_off();
          // light_relay (cooling fan) stays on -- managed by cooldown logic in 1s interval
          id(timer_state) = 0;
          id(timer_delay_remaining) = 0;
          id(timer_cook_remaining) = 0;
          id(preheat_elapsed_seconds) = 0;
          id(cook_total_seconds) = 0;
          id(active_temperature) = 0.0f;
          id(working_temperature) = 0.0f;
          id(working_timer) = 0.0f;
          id(working_start_delay) = 0.0f;
          id(desired_top_element) = false;
          id(desired_bottom_element) = false;
          id(desired_grill_element) = false;
          id(desired_fan_element) = false;
          id(active_top_element) = false;
          id(active_bottom_element) = false;
          id(active_grill_element) = false;
          id(active_fan_element) = false;
          id(mode_selected_element) = 0;

  # Wake screen and reset activity timer
  - id: wake_screen
    then:
      - lambda: |-
          id(last_activity_time) = millis();
      - if:
          condition:
            lambda: "return id(screen_sleeping);"
          then:
            - lambda: |-
                id(screen_sleeping) = false;
            - light.turn_on: display_backlight
            - component.update: oven_display

  # Put screen to sleep
  - id: sleep_screen
    then:
      - if:
          condition:
            lambda: "return !id(screen_sleeping);"
          then:
            - lambda: |-
                id(screen_sleeping) = true;
            - component.update: oven_display
            - light.turn_off: display_backlight

  # Return to main page after timeout
  - id: return_to_main
    then:
      - lambda: |-
          if (id(current_page) != 0) {
            id(current_page) = 0;
          }

  # Beep the buzzer when cooking finishes (3 short beeps)
  - id: buzzer_cook_finished
    then:
      - output.turn_on: buzzer_output
      - delay: 200ms
      - output.turn_off: buzzer_output
      - delay: 200ms
      - output.turn_on: buzzer_output
      - delay: 200ms
      - output.turn_off: buzzer_output
      - delay: 200ms
      - output.turn_on: buzzer_output
      - delay: 400ms
      - output.turn_off: buzzer_output

  # Beep the buzzer when preheating finishes (fast 2-beep pattern)
  - id: buzzer_preheat_finished
    then:
      - output.turn_on: buzzer_output
      - delay: 120ms
      - output.turn_off: buzzer_output
      - delay: 120ms
      - output.turn_on: buzzer_output
      - delay: 180ms
      - output.turn_off: buzzer_output

# Intervals for runtime and sleep management
interval:
  # Core oven runtime loop (1 Hz): timer state machine and SSR gating.
  # Temperature is read from MAX31865 PT100 via current_oven_temp global.
  - interval: 1s
    then:
      - lambda: |-
          int previous_state = id(last_timer_state_observed);
          float target = id(active_temperature);

          // Temperature is processed in the MAX31865 on_value callback.
          // We just read the smoothed result here.
          float current_temp = id(current_oven_temp);

          // Timer state machine (NO auto-start; programs only start via apply_program)
          int state = id(timer_state);

          // Resume an in-progress cook after power loss
          if (state == 0 && id(timer_cook_remaining) > 0) {
            if (id(timer_delay_remaining) > 0) {
              id(timer_state) = 1;
            } else {
              id(timer_state) = 4;
            }
            state = id(timer_state);
          }

          bool heating_elements_selected =
            id(active_top_element) ||
            id(active_bottom_element) ||
            id(active_grill_element);

          if (state == 1) {
            // Waiting (delay before cook) - elements should stay off here
            if (id(timer_delay_remaining) > 0) {
              id(timer_delay_remaining)--;
            }
            if (id(timer_delay_remaining) <= 0) {
              id(timer_delay_remaining) = 0;
              bool needs_preheat = target > 0.0f && heating_elements_selected;
              id(timer_state) = needs_preheat ? 2 : 4;
            }
          } else if (state == 2) {
            // Preheating: wait until target temp reached
            if (id(preheat_elapsed_seconds) < 2147483647) {
              id(preheat_elapsed_seconds)++;
            }

            // Optional timeout to avoid being stuck forever in PREHEATING.
            // Set preheat_timeout_minutes=0 to disable this behavior.
            int timeout_sec = 0;
            if (id(preheat_timeout_minutes) > 0.0f) {
              timeout_sec = (int)(id(preheat_timeout_minutes) * 60.0f);
            }
            if (timeout_sec > 0 && id(preheat_elapsed_seconds) >= timeout_sec) {
              id(timer_state) = (id(working_start_delay) > 0.0f) ? 4 : 3;
              id(buzzer_preheat_finished).execute();
            }

            if (target > 0.0f && heating_elements_selected) {
              if (current_temp >= target - 1.0f) {
                id(timer_state) = (id(working_start_delay) > 0.0f) ? 4 : 3;
                id(buzzer_preheat_finished).execute();
              }
            }
          } else if (state == 3) {
            // Ready: oven at temp, holding, waiting for user to press any button
            // PID and fan keep running (handled by allow_heat / allow_fan)
            // No countdown, no timeout — just hold
          } else if (state == 4) {
            // Cooking: only decrement when timed; no-timer (remaining=0) runs until user cancels
            if (id(timer_cook_remaining) > 0) {
              id(timer_cook_remaining)--;
              if (id(timer_cook_remaining) <= 0) {
                id(timer_cook_remaining) = 0;
                id(timer_state) = 0;
                id(cancel_program).execute();
                id(buzzer_cook_finished).execute();
              }
            }
          }

          // Allow heating only when timer is in preheat/cook (states 2 or 3)
          bool any_heating_active =
            id(active_top_element) ||
            id(active_bottom_element) ||
            id(active_grill_element);

          bool allow_heat =
            (target > 0.0f && any_heating_active) &&
            (id(timer_state) == 2 || id(timer_state) == 3 || id(timer_state) == 4);

          // PID gating: only update climate component on state transitions
          if (allow_heat && !id(pid_heat_was_active)) {
            auto call = id(pid_climate).make_call();
            call.set_mode("HEAT");
            call.set_target_temperature(target);
            call.perform();
          } else if (allow_heat) {
            if (id(pid_climate).target_temperature != target) {
              auto call = id(pid_climate).make_call();
              call.set_target_temperature(target);
              call.perform();
            }
          } else if (!allow_heat && id(pid_heat_was_active)) {
            auto call = id(pid_climate).make_call();
            call.set_mode("OFF");
            call.perform();
            id(top_element_relay).turn_off();
            id(bottom_element_relay).turn_off();
            id(grill_element_relay).turn_off();
          }
          id(pid_heat_was_active) = allow_heat;

          // Fan runs when selected and program is active (no temperature requirement)
          bool program_active = (id(timer_state) == 2 || id(timer_state) == 3 || id(timer_state) == 4);
          bool allow_fan = id(active_fan_element) && program_active;
          if (allow_fan) {
            id(fan_relay).turn_on();
          } else {
            id(fan_relay).turn_off();
          }

          // Cooling fan (light relay): ON when heating, fan running, or temp above safe threshold
          if (allow_heat || allow_fan) {
            id(light_relay).turn_on();
          } else if (current_temp > id(cooldown_temp_threshold)) {
            id(light_relay).turn_on();
          } else {
            id(light_relay).turn_off();
          }

          // Wake display when runtime program phase changes
          if (id(timer_state) == 2 && previous_state != 2) {
            id(preheat_elapsed_seconds) = 0;
          }
          if (id(timer_state) != previous_state) {
            id(last_timer_state_observed) = id(timer_state);
            id(wake_screen).execute();
          }

          // Keep screen awake while in ready state (waiting for user)
          if (id(timer_state) == 3) {
            id(wake_screen).execute();
          }

  # Check for sleep timeout (every 5 seconds)
  - interval: 5s
    then:
      - lambda: |-
          unsigned long now = millis();
          unsigned long idle_time = now - id(last_activity_time);

          // Main page: sleep after 60 seconds
          if (id(current_page) == 0 && idle_time > 60000 && !id(screen_sleeping)) {
            id(sleep_screen).execute();
          }

          // Detail pages: return to main after 60 seconds
          if (id(current_page) != 0 && idle_time > 60000) {
            id(return_to_main).execute();
          }

# Switches for oven element control (SSR outputs)
switch:
  # Home Assistant: desired profile selectors (same behavior as mode page)
  - platform: template
    id: ha_top_element_selected
    name: "Top Element Selected"
    icon: "mdi:radiator"
    lambda: |-
      return id(desired_top_element);
    turn_on_action:
      - lambda: |-
          id(desired_top_element) = true;
    turn_off_action:
      - lambda: |-
          id(desired_top_element) = false;

  - platform: template
    id: ha_bottom_element_selected
    name: "Bottom Element Selected"
    icon: "mdi:radiator"
    lambda: |-
      return id(desired_bottom_element);
    turn_on_action:
      - lambda: |-
          id(desired_bottom_element) = true;
    turn_off_action:
      - lambda: |-
          id(desired_bottom_element) = false;

  - platform: template
    id: ha_grill_element_selected
    name: "Grill Element Selected"
    icon: "mdi:grill"
    lambda: |-
      return id(desired_grill_element);
    turn_on_action:
      - lambda: |-
          id(desired_grill_element) = true;
    turn_off_action:
      - lambda: |-
          id(desired_grill_element) = false;

  - platform: template
    id: ha_fan_selected
    name: "Fan Selected"
    icon: "mdi:fan"
    lambda: |-
      return id(desired_fan_element);
    turn_on_action:
      - lambda: |-
          id(desired_fan_element) = true;
    turn_off_action:
      - lambda: |-
          id(desired_fan_element) = false;

  # Top heating element SSR
  - platform: gpio
    id: top_element_relay
    name: "Top Heating Element"
    internal: true
    pin: GPIO1
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: id(light_relay).turn_on();

  # Bottom heating element SSR
  - platform: gpio
    id: bottom_element_relay
    name: "Bottom Heating Element"
    internal: true
    pin: GPIO2
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: id(light_relay).turn_on();

  # Grill element SSR
  - platform: gpio
    id: grill_element_relay
    name: "Grill Element"
    internal: true
    pin: GPIO3
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: id(light_relay).turn_on();

  # Fan SSR
  - platform: gpio
    id: fan_relay
    name: "Fan"
    internal: true
    pin: GPIO4
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: id(light_relay).turn_on();

  # Oven light SSR
  - platform: gpio
    id: light_relay
    name: "Oven Light"
    internal: true
    pin: GPIO5
    restore_mode: ALWAYS_OFF

# Utility buttons
button:
  - platform: template
    name: "Apply Program"
    icon: "mdi:check-bold"
    on_press:
      - script.execute: apply_program

  - platform: template
    name: "Cancel Program"
    icon: "mdi:cancel"
    on_press:
      - script.execute: cancel_program

  - platform: template
    name: "PID Autotune"
    icon: "mdi:auto-fix"
    on_press:
      - climate.pid.autotune:
          id: pid_climate
          positive_output: 0.7
          noiseband: 0.05

  # Restart button
  - platform: restart
    name: "Restart ESP32-S3"

  # Force a display refresh
  - platform: template
    name: "Refresh Display"
    internal: true
    on_press:
      - component.update: oven_display
