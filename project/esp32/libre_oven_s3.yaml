    update_interval: 1s
    lambda: |-
      int sec = id(timer_delay_remaining);
      if (sec < 0) sec = 0;
      int h = sec / 3600;
      int m = (sec % 3600) / 60;
      int s = sec % 60;
      char buf[12];
      snprintf(buf, sizeof(buf), "%02d:%02d:%02d", h, m, s);
      return std::string(buf);

  - platform: template
    id: timer_cook_remaining_formatted
    name: "Cook Remaining"
    update_interval: 1s
    lambda: |-
      int sec = id(timer_cook_remaining);
      if (sec < 0) sec = 0;
      int h = sec / 3600;
      int m = (sec % 3600) / 60;
      int s = sec % 60;
      char buf[12];
      snprintf(buf, sizeof(buf), "%02d:%02d:%02d", h, m, s);
      return std::string(buf);

  - platform: template
    id: timer_active_countdown_formatted
    name: "Active Countdown"
    update_interval: 1s
    lambda: |-
      int state = id(timer_state);
      int sec = 0;
      if (state == 1 || state == 2) sec = id(timer_delay_remaining);
      else if (state == 3 || state == 4) sec = id(timer_cook_remaining);
      if (sec < 0) sec = 0;
      int h = sec / 3600;
      int m = (sec % 3600) / 60;
      int s = sec % 60;
